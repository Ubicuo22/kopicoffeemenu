<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kopi coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f5f2ee;
      --cream: #e8e2d9;
      --neon: #c8f060;
      --grey: #2a2a2a;
      --mid: #555;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo / Header */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.8s ease both;
    }

    .logo-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 1px solid rgba(200,240,96,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      border: 1px solid rgba(200,240,96,0.15);
    }

    .logo-icon {
      font-size: 32px;
      line-height: 1;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--white);
      line-height: 1;
    }

    .brand-name span {
      color: var(--neon);
    }

    .tagline {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--mid);
      margin-top: 8px;
    }

    /* Location badge */
    .location {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(200,240,96,0.6);
      border: 1px solid rgba(200,240,96,0.2);
      padding: 5px 14px;
      border-radius: 20px;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      display: flex;
      align-items: center;
      text-decoration: none;
      padding: 18px 24px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px;
      background: rgba(255,255,255,0.02);
      color: var(--white);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }

    .link-item:nth-child(1) { animation-delay: 0.2s; }
    .link-item:nth-child(2) { animation-delay: 0.35s; }
    .link-item:nth-child(3) { animation-delay: 0.5s; }

    .link-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0;
      background: var(--neon);
      transition: width 0.3s ease;
    }

    .link-item:hover {
      border-color: rgba(200,240,96,0.3);
      background: rgba(200,240,96,0.04);
      transform: translateX(4px);
    }

    .link-item:hover::before {
      width: 3px;
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .link-item:hover .link-icon {
      background: rgba(200,240,96,0.1);
      border-color: rgba(200,240,96,0.4);
    }

    .link-icon svg {
      width: 16px;
      height: 16px;
      fill: var(--white);
      transition: fill 0.3s ease;
    }

    .link-item:hover .link-icon svg {
      fill: var(--neon);
    }

    .link-text {
      flex: 1;
    }

    .link-label {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--mid);
      display: block;
      margin-bottom: 2px;
    }

    .link-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .link-arrow {
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.3s ease;
      color: var(--neon);
      font-size: 18px;
    }

    .link-item:hover .link-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      text-align: center;
      animation: fadeUp 0.6s ease 0.65s both;
    }

    .footer-divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(200,240,96,0.4), transparent);
      margin: 0 auto 16px;
    }

    .footer-text {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Neon glow dot */
    .glow-dot {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,240,96,0.06) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-dot-2 {
      position: fixed;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,240,96,0.04) 0%, transparent 70%);
      bottom: 0;
      left: -50px;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="glow-dot"></div>
  <div class="glow-dot-2"></div>

    </div>

    <div class="footer">
      <div class="footer-divider"></div>
      <p class="footer-text">kopi coffee · Plaza Andador · Morelia</p>
    </div>
  </div>
</body>
