<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kopi coffee. — links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,700;0,800;0,900;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>

    /* ── Fuentes locales ── */
    @font-face {
      font-family: 'Behmer';
      src: url('../fonts/Behmer.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* ── Variables (idénticas al menú) ── */
    :root {
      --black:  #0a0a0a;
      --white:  #f5f5f0;
      --gray:   #1a1a1a;
      --mid:    #888;
      --pink:   #ff3ea5;  /* Instagram */
      --amber:  #f5a300;  /* Menú      */
      --green:  #25d366;  /* WhatsApp  */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      overflow-x: hidden;
    }

    /* ── Vapor background (igual que el menú) ── */
    .vapor-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.3;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Contenedor ── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header / Logo ── */
    .header {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeUp 1s ease both;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-icon {
      width: 120px;
      height: auto;
      margin-bottom: 24px;
      object-fit: contain;
    }

    .logo-text {
      font-family: 'Barlow', sans-serif;
      font-weight: 900;
      font-size: clamp(72px, 22vw, 120px);
      letter-spacing: -6px;
      margin-left: -6px; /* compensa el trailing space del letter-spacing */
      line-height: 0.88;
      text-align: center;
      color: var(--white);
      text-transform: lowercase;
    }

    .logo-text span {
      display: block;
      font-family: 'Barlow', sans-serif;
      font-weight: 400;
      font-size: 0.22em;
      letter-spacing: 0.35em;
      color: var(--mid);
      text-transform: lowercase;
      margin-top: 18px;
    }

    .location {
      margin-top: 16px;
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #444;
      animation: fadeUp 1s ease 0.3s both;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      display: flex;
      align-items: center;
      text-decoration: none;
      padding: 20px 24px;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 2px;
      background: rgba(255,255,255,0.02);
      color: var(--white);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }

    .link-item:nth-child(1) { animation-delay: 0.35s; }
    .link-item:nth-child(2) { animation-delay: 0.5s;  }
    .link-item:nth-child(3) { animation-delay: 0.65s; }

    .link-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0;
      transition: width 0.25s ease;
    }

    .link-item:hover { transform: translateX(4px); }
    .link-item:hover::before { width: 3px; }

    /* ── Instagram — rosa ── */
    .link-item:nth-child(1)::before        { background: var(--pink); }
    .link-item:nth-child(1):hover          { border-color: rgba(255,62,165,0.3); background: rgba(255,62,165,0.04); }
    .link-item:nth-child(1):hover .link-icon { background: rgba(255,62,165,0.12); border-color: rgba(255,62,165,0.4); }
    .link-item:nth-child(1):hover .link-icon svg { fill: var(--pink); }
    .link-item:nth-child(1):hover .link-arrow { color: var(--pink); }

    /* ── Menú — ámbar ── */
    .link-item:nth-child(2)::before        { background: var(--amber); }
    .link-item:nth-child(2):hover          { border-color: rgba(245,163,0,0.3); background: rgba(245,163,0,0.04); }
    .link-item:nth-child(2):hover .link-icon { background: rgba(245,163,0,0.12); border-color: rgba(245,163,0,0.4); }
    .link-item:nth-child(2):hover .link-icon svg { fill: var(--amber); }
    .link-item:nth-child(2):hover .link-arrow { color: var(--amber); }

    /* ── WhatsApp — verde ── */
    .link-item:nth-child(3)::before        { background: var(--green); }
    .link-item:nth-child(3):hover          { border-color: rgba(37,211,102,0.3); background: rgba(37,211,102,0.04); }
    .link-item:nth-child(3):hover .link-icon { background: rgba(37,211,102,0.12); border-color: rgba(37,211,102,0.4); }
    .link-item:nth-child(3):hover .link-icon svg { fill: var(--green); }
    .link-item:nth-child(3):hover .link-arrow { color: var(--green); }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 18px;
      flex-shrink: 0;
      transition: all 0.25s ease;
    }

    .link-icon svg {
      width: 16px;
      height: 16px;
      fill: var(--mid);
      transition: fill 0.25s ease;
    }

    .link-text { flex: 1; }

    .link-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #444;
      display: block;
      margin-bottom: 3px;
    }

    .link-name {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.02em;
      color: #ccc;
      text-transform: lowercase;
      transition: color 0.25s;
    }

    .link-item:hover .link-name { color: var(--white); }

    .link-arrow {
      opacity: 0;
      transform: translateX(-6px);
      transition: all 0.25s ease;
      font-size: 16px;
      font-family: 'Space Mono', monospace;
    }

    .link-item:hover .link-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 52px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.6s ease 0.8s both;
    }

    .footer-line {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, #2a2a2a, transparent);
    }

    .footer-text {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #2a2a2a;
    }

    .footer-ubicuo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .footer-ubicuo:hover { opacity: 0.7; }
    .footer-ubicuo img   { width: 20px; height: auto; }

    .footer-ubicuo span {
      font-family: 'Behmer', sans-serif;
      font-size: 13px;
      color: #2a2a2a;
      letter-spacing: 0.05em;
    }

    /* ── Animaciones ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 48px 20px; }
      .logo-text { font-size: clamp(60px, 24vw, 90px); }
    }

  </style>
</head>
